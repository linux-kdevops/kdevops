---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Out-of-tree kernel build with make install + make modules_install
# on the Ansible controller. Leaves a vmlinuz at
# <destdir>/boot/vmlinuz-<release> and a modules tree under
# <destdir>/lib/modules/<release>/ that a downstream bringup
# backend consumes in place (for example through -kernel and a
# virtiofs share of the modules directory).
#
# Idempotency strategy: always clone, copy the .config, and run
# olddefconfig so the build tree reflects the intended config,
# then ask make what the kernel release for that config would be
# and check whether the matching vmlinuz + modules tree already
# live under destdir. If they do, skip make + make install + make
# modules_install; otherwise run the full pipeline. This way a
# seed .config swap (for example CONFIG_LOCALVERSION_AUTO flip, a
# new CONFIG_LOCALVERSION, a new git HEAD) invalidates the cache
# on its own, without asking the operator to rm destdir first.

- name: Compose the controller-mode build environment
  ansible.builtin.set_fact:
    bootlinux_controller_build_environment: "{{ bootlinux_build_environment | combine({'LOCALVERSION': target_linux_localversion | default('', true)}) }}"
  run_once: true
  delegate_to: localhost

- name: Install dependencies to build the Linux kernel
  delegate_to: localhost
  run_once: true
  ansible.builtin.import_tasks:
    file: install-deps/main.yml

- name: Ensure the controller build and install directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ bootlinux_controller_builddir }}"
    - "{{ bootlinux_controller_destdir }}"
  run_once: true
  delegate_to: localhost

- name: Git clone {{ target_linux_tree }} on the control node
  ansible.builtin.git:
    repo: "{{ target_linux_git }}"
    dest: "{{ bootlinux_controller_tree_path }}"
    version: "{{ target_linux_ref }}"
    depth: "{{ target_linux_shallow_depth | default(omit) }}"
    force: "{{ target_linux_force_checkout | default(false) }}"
  run_once: true
  delegate_to: localhost
  tags: ["clone"]

- name: Copy configuration for {{ target_linux_tree }} to the build directory
  ansible.builtin.copy:
    src: "{{ role_path }}/templates/{{ linux_config }}"
    dest: "{{ bootlinux_controller_builddir }}/.config"
    mode: '0644'
  run_once: true
  delegate_to: localhost

- name: Resolve .config against the tree with olddefconfig
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: olddefconfig
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags: ["build-linux"]

- name: Sync include/config/auto.conf to the refreshed .config
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: syncconfig
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags: ["build-linux"]

- name: Compute the expected kernel release from the resolved build tree
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: kernelrelease
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  register: bootlinux_controller_kernelrelease_make
  changed_when: false
  run_once: true
  delegate_to: localhost

- name: Record the expected kernel release
  ansible.builtin.set_fact:
    bootlinux_controller_kernel_release: "{{ bootlinux_controller_kernelrelease_make.stdout_lines[-1] }}"
  run_once: true
  delegate_to: localhost

- name: Probe destdir for a kernel image matching the expected release
  ansible.builtin.stat:
    path: "{{ bootlinux_controller_destdir }}/boot/vmlinuz-{{ bootlinux_controller_kernel_release }}"
  register: bootlinux_controller_vmlinuz_stat
  run_once: true
  delegate_to: localhost

- name: Probe destdir for the modules tree matching the expected release
  ansible.builtin.stat:
    path: "{{ bootlinux_controller_destdir }}/lib/modules/{{ bootlinux_controller_kernel_release }}/modules.dep"
  register: bootlinux_controller_modules_dep
  run_once: true
  delegate_to: localhost

- name: Checksum the resolved build .config
  ansible.builtin.stat:
    path: "{{ bootlinux_controller_builddir }}/.config"
    checksum_algorithm: sha256
  register: bootlinux_controller_builddir_config_stat
  run_once: true
  delegate_to: localhost

- name: Checksum the installed config-<release> snapshot
  ansible.builtin.stat:
    path: "{{ bootlinux_controller_destdir }}/boot/config-{{ bootlinux_controller_kernel_release }}"
    checksum_algorithm: sha256
  register: bootlinux_controller_destdir_config_stat
  run_once: true
  delegate_to: localhost

- name: Flag the controller build as already cached
  ansible.builtin.set_fact:
    bootlinux_controller_already_built: >-
      {{ bootlinux_controller_vmlinuz_stat.stat.exists
         and bootlinux_controller_modules_dep.stat.exists
         and bootlinux_controller_destdir_config_stat.stat.exists
         and bootlinux_controller_builddir_config_stat.stat.checksum ==
             bootlinux_controller_destdir_config_stat.stat.checksum }}
  run_once: true
  delegate_to: localhost

- name: Report the cached controller build we will reuse
  ansible.builtin.debug:
    msg: "Reusing existing controller build: vmlinuz-{{ bootlinux_controller_kernel_release }}"
  when:
    - bootlinux_controller_already_built | bool
  run_once: true
  delegate_to: localhost

- name: Get nproc on the control node
  ansible.builtin.command: nproc
  register: nproc_controller
  changed_when: false
  run_once: true
  delegate_to: localhost
  tags: ["build-linux"]
  when:
    - not bootlinux_controller_already_built | bool

- name: Build {{ target_linux_tree }} on the control node using {{ nproc_controller.stdout | default('nproc') }} threads
  community.general.make:
    jobs: "{{ nproc_controller.stdout }}"
    chdir: "{{ bootlinux_controller_tree_path }}"
    params: "{{ bootlinux_make_params | combine({'O': bootlinux_controller_builddir}) }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags: ["build-linux"]
  when:
    - not bootlinux_controller_already_built | bool

- name: Install the kernel image into <destdir>/boot
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: install
    params:
      O: "{{ bootlinux_controller_builddir }}"
      INSTALL_PATH: "{{ bootlinux_controller_destdir }}/boot"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags: ["install-linux"]
  when:
    - not bootlinux_controller_already_built | bool

- name: Install kernel modules into <destdir>/lib/modules
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: modules_install
    params:
      O: "{{ bootlinux_controller_builddir }}"
      INSTALL_MOD_PATH: "{{ bootlinux_controller_destdir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags: ["install-linux"]
  when:
    - not bootlinux_controller_already_built | bool

- name: Publish controller-install facts for downstream roles
  ansible.builtin.set_fact:
    bootlinux_controller_kernel_image: "{{ bootlinux_controller_destdir }}/boot/vmlinuz-{{ bootlinux_controller_kernel_release }}"
    bootlinux_controller_modules_dir: "{{ bootlinux_controller_destdir }}/lib/modules/{{ bootlinux_controller_kernel_release }}"
  run_once: true
  delegate_to: localhost
