---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Out-of-tree kernel build with make install + make modules_install
# on the Ansible controller. Leaves a vmlinuz at
# <destdir>/boot/vmlinuz-<release> and a modules tree under
# <destdir>/lib/modules/<release>/ that a downstream bringup
# backend consumes in place (for example through -kernel and a
# virtiofs share of the modules directory).
#
# No playbook-side cache: olddefconfig + syncconfig + make + make
# install + make modules_install run on every invocation. Make's
# source-level dependency tracking is the cache. A no-op rebuild
# walks the dep graph and exits in seconds; a real source change
# rebuilds only what actually changed. A config-only cache
# (sha256 of .config) cannot see source edits and silently
# skipped the build for the iteration case this path exists to
# serve.

- name: Compose the controller-mode build environment
  ansible.builtin.set_fact:
    bootlinux_controller_build_environment: "{{ bootlinux_build_environment | combine({'LOCALVERSION': target_linux_localversion | default('', true)}) }}"
  run_once: true
  delegate_to: localhost
  tags:
    - always

- name: Install dependencies to build the Linux kernel
  delegate_to: localhost
  run_once: true
  ansible.builtin.import_tasks:
    file: install-deps/main.yml

- name: Ensure the controller build and install directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ bootlinux_controller_builddir }}"
    - "{{ bootlinux_controller_destdir }}"
  run_once: true
  delegate_to: localhost
  tags:
    - always

# Detect a tree the user populated already — manual git clone, a
# git worktree (.git is a file pointing at the gitdir), a symlink
# to another checkout, or a previous kdevops bringup. When such a
# tree exists at bootlinux_controller_tree_path, kdevops uses it
# in place: no fetch, no checkout, no ref switching. Build commands
# (olddefconfig, syncconfig, make) run against whatever HEAD the
# user has — which is the contract the user controls when they
# point BOOTLINUX_CONTROLLER_TREE_PATH at their own kernel
# worktree. The git clone task fires only when the path is empty,
# i.e. on a clean bringup with kdevops's default tree URL.
- name: Detect a pre-existing kernel tree under bootlinux_controller_tree_path
  ansible.builtin.stat:
    path: "{{ bootlinux_controller_tree_path }}/.git"
  register: bootlinux_controller_tree_git
  run_once: true
  delegate_to: localhost
  tags:
    - clone
    - always

- name: Note that the controller tree is user-managed (skip clone/checkout)
  ansible.builtin.debug:
    msg: |
      {{ bootlinux_controller_tree_path }} already contains a git
      checkout (.git {{ "is a file (worktree)" if bootlinux_controller_tree_git.stat.isreg | default(false) else "is a directory" }}).
      kdevops will not clone, fetch, or checkout — building against
      whatever HEAD is currently in that tree.
  when:
    - bootlinux_controller_tree_git.stat.exists | default(false) | bool
  run_once: true
  delegate_to: localhost
  tags:
    - clone
    - always

- name: Git clone {{ target_linux_tree }} on the control node
  ansible.builtin.git:
    repo: "{{ target_linux_git }}"
    dest: "{{ bootlinux_controller_tree_path }}"
    version: "{{ target_linux_ref }}"
    depth: "{{ target_linux_shallow_depth | default(omit) }}"
    force: "{{ target_linux_force_checkout | default(false) }}"
  when:
    - not bootlinux_controller_tree_git.stat.exists | default(false) | bool
  run_once: true
  delegate_to: localhost
  tags:
    - clone

- name: Copy configuration for {{ target_linux_tree }} to the build directory
  ansible.builtin.copy:
    src: "{{ role_path }}/templates/{{ linux_config }}"
    dest: "{{ bootlinux_controller_builddir }}/.config"
    mode: '0644'
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Resolve .config against the tree with olddefconfig
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: olddefconfig
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Sync include/config/auto.conf to the refreshed .config
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: syncconfig
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Compute the expected kernel release from the resolved build tree
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: kernelrelease
    params:
      O: "{{ bootlinux_controller_builddir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  register: bootlinux_controller_kernelrelease_make
  changed_when: false
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Record the expected kernel release
  ansible.builtin.set_fact:
    bootlinux_controller_kernel_release: "{{ bootlinux_controller_kernelrelease_make.stdout_lines[-1] }}"
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Get nproc on the control node
  ansible.builtin.command: nproc
  register: nproc_controller
  changed_when: false
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Build {{ target_linux_tree }} on the control node using {{ nproc_controller.stdout | default('nproc') }} threads
  community.general.make:
    jobs: "{{ nproc_controller.stdout }}"
    chdir: "{{ bootlinux_controller_tree_path }}"
    params: "{{ bootlinux_make_params | combine({'O': bootlinux_controller_builddir}) }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags:
    - build-linux

- name: Install the kernel image into <destdir>/boot
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: install
    params:
      O: "{{ bootlinux_controller_builddir }}"
      INSTALL_PATH: "{{ bootlinux_controller_destdir }}/boot"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags:
    - install-linux

- name: Install kernel modules into <destdir>/lib/modules
  community.general.make:
    chdir: "{{ bootlinux_controller_tree_path }}"
    target: modules_install
    params:
      O: "{{ bootlinux_controller_builddir }}"
      INSTALL_MOD_PATH: "{{ bootlinux_controller_destdir }}"
  environment: "{{ bootlinux_controller_build_environment }}"
  run_once: true
  delegate_to: localhost
  tags:
    - install-linux

- name: Publish controller-install facts for downstream roles
  ansible.builtin.set_fact:
    bootlinux_controller_kernel_image: "{{ bootlinux_controller_destdir }}/boot/vmlinuz-{{ bootlinux_controller_kernel_release }}"
    bootlinux_controller_modules_dir: "{{ bootlinux_controller_destdir }}/lib/modules/{{ bootlinux_controller_kernel_release }}"
  run_once: true
  delegate_to: localhost
  tags:
    - install-linux

# Developer tooling outputs (compile_commands.json, scripts_gdb,
# rust-project.json). Gated by the umbrella bootlinux_dev_tools so
# non-developer builds skip the step entirely. See dev_tools.yml
# for per-task idempotency rationale.
- name: Generate developer tooling outputs into the source tree
  ansible.builtin.import_tasks: dev_tools.yml
  when:
    - bootlinux_dev_tools | default(false) | bool
  tags:
    - dev-tools
