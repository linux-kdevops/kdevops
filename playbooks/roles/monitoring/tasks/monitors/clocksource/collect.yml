---
# clocksource collect: snapshot again at workflow end so a reviewer
# can spot any drift between start.json and end.json.

- name: Take end-of-run clocksource snapshot on {{ inventory_hostname }}
  become: true
  become_method: sudo
  ansible.builtin.script:
    cmd: "{{ playbook_dir }}/roles/monitoring/files/monitor_snapshot.py --profile clocksource /data/monitor/clocksource/end.json"
    executable: python3
  changed_when: true
  when:
    - monitor_clocksource | default(false) | bool

- name: Locate clocksource outputs for {{ inventory_hostname }}
  delegate_to: localhost
  run_once: true
  ansible.builtin.find:
    paths: "{{ topdir_path }}/workflows/{{ kdevops_workflow_name | default('unknown') }}/results/monitoring/{{ inventory_hostname }}/clocksource"
    patterns: "*.json"
    file_type: file
  register: clocksource_outputs
  when:
    - monitor_clocksource | default(false) | bool

- name: Report clocksource collection summary
  delegate_to: localhost
  run_once: true
  ansible.builtin.debug:
    msg: |
      clocksource outputs for {{ inventory_hostname }}:
      {% for f in clocksource_outputs.files | default([]) %}
        - {{ f.path }}
      {% endfor %}
  when:
    - monitor_clocksource | default(false) | bool
