---
# lsm collect: snapshot again at workflow end so a reviewer
# can spot any drift between start.json and end.json.

- name: Take end-of-run lsm snapshot on {{ inventory_hostname }}
  become: true
  become_method: sudo
  ansible.builtin.script:
    cmd: "{{ playbook_dir }}/roles/monitoring/files/monitor_snapshot.py --profile lsm /data/monitor/lsm/end.json"
    executable: python3
  changed_when: true
  when:
    - monitor_lsm | default(false) | bool

- name: Locate lsm outputs for {{ inventory_hostname }}
  delegate_to: localhost
  run_once: true
  ansible.builtin.find:
    paths: "{{ topdir_path }}/workflows/{{ kdevops_workflow_name | default('unknown') }}/results/monitoring/{{ inventory_hostname }}/lsm"
    patterns: "*.json"
    file_type: file
  register: lsm_outputs
  when:
    - monitor_lsm | default(false) | bool

- name: Report lsm collection summary
  delegate_to: localhost
  run_once: true
  ansible.builtin.debug:
    msg: |
      lsm outputs for {{ inventory_hostname }}:
      {% for f in lsm_outputs.files | default([]) %}
        - {{ f.path }}
      {% endfor %}
  when:
    - monitor_lsm | default(false) | bool
