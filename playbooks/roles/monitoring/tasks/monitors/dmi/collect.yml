---
# dmi collect: snapshot again at workflow end so a reviewer
# can spot any drift between start.json and end.json.

- name: Take end-of-run dmi snapshot on {{ inventory_hostname }}
  become: true
  become_method: sudo
  ansible.builtin.script:
    cmd: "{{ playbook_dir }}/roles/monitoring/files/monitor_snapshot.py --profile dmi /data/monitor/dmi/end.json"
    executable: python3
  changed_when: true
  when:
    - monitor_dmi | default(false) | bool

- name: Locate dmi outputs for {{ inventory_hostname }}
  delegate_to: localhost
  run_once: true
  ansible.builtin.find:
    paths: "{{ topdir_path }}/workflows/{{ kdevops_workflow_name | default('unknown') }}/results/monitoring/{{ inventory_hostname }}/dmi"
    patterns: "*.json"
    file_type: file
  register: dmi_outputs
  when:
    - monitor_dmi | default(false) | bool

- name: Report dmi collection summary
  delegate_to: localhost
  run_once: true
  ansible.builtin.debug:
    msg: |
      dmi outputs for {{ inventory_hostname }}:
      {% for f in dmi_outputs.files | default([]) %}
        - {{ f.path }}
      {% endfor %}
  when:
    - monitor_dmi | default(false) | bool
