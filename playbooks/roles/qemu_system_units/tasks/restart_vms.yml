#
# Restart each qemu-system@<vm>.service so QEMU re-execs and
# re-reads vm.env. Use after rebuild-boot to make a freshly
# rendered kernel path (or any other vm.env change) take effect
# on a running guest. The QEMU process is the kernel host: a
# kernel change cannot be hot-activated, only re-execed. See
# README.md.
#
# Per-(VM, kernel) virtiofsd share rebinding is automatic: the
# qemu-system-units virtiofsd@.service template carries
# StopWhenUnneeded=yes, and the per-VM drop-in emits
# BindsTo=virtiofsd@%i-<tag>.service for every share. When QEMU
# stops, the BindsTo reference releases, virtiofsd auto-stops,
# and the next QEMU connection re-triggers socket activation
# against the freshly rendered env file (with the new kernel's
# share directory). No explicit virtiofsd stop is needed.

- name: Restart qemu-system@<vm> instances
  ansible.builtin.systemd_service:
    name: "qemu-system@{{ item }}.service"
    state: restarted
    scope: user
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
