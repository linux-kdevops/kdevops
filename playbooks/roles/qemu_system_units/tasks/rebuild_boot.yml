---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Re-render per-VM artefacts so the next start of
# qemu-system@<vm>.service boots from the latest closure. No
# hot activation. See README.md.
#
# Renders per-node default.nix first, in case the role's template
# vars (workflow toggles, monitoring opt-in, ssh key) changed
# since bringup. Without this step the closure built by
# imageless_build.yml would still reflect the bringup-time
# default.nix and skip new module imports or removed options.

# Re-render per-node flake.nix and default.nix in case Kconfig
# toggles or template content changed since bringup. Imports
# generate_configs.yml because the default.nix template depends on
# the SSH key fact which generate_configs.yml sets — duplicating
# the fact resolution here would drift out of sync.
- ansible.builtin.import_tasks: generate_configs.yml

# nix path: inputs are pinned by narHash in flake.lock. Edits to
# the subtree (new modules under scripts/nixos-qemu/modules/, new
# template content, etc.) will not propagate to the closure until
# the lock entry for the input is refreshed. xfstests-src has the
# same property and is refreshed below when CONFIG_FSTESTS_GIT is
# set.
- name: Refresh nixos-qemu flake input for each VM
  ansible.builtin.command:
    argv:
      - nix
      - flake
      - update
      - --flake
      - "path:{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ item }}"
      - nixos-qemu
  environment:
    PATH: "/nix/var/nix/profiles/default/bin:{{ ansible_facts.env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  changed_when: true

- name: Refresh xfstests-src flake input for each VM
  ansible.builtin.command:
    argv:
      - nix
      - flake
      - update
      - --flake
      - "path:{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ item }}"
      - xfstests-src
  environment:
    PATH: "/nix/var/nix/profiles/default/bin:{{ ansible_facts.env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  when:
    - fstests_git | default('') | length > 0
  changed_when: true

- name: Refresh xfsprogs-src flake input for each VM
  ansible.builtin.command:
    argv:
      - nix
      - flake
      - update
      - --flake
      - "path:{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ item }}"
      - xfsprogs-src
  environment:
    PATH: "/nix/var/nix/profiles/default/bin:{{ ansible_facts.env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  when:
    - fstests_xfsprogs_git | default('') | length > 0
  changed_when: true

- ansible.builtin.import_tasks: imageless_build.yml
