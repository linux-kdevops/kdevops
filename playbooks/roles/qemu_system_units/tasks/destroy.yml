---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Stop any running qsu VMs and remove the shared units plus the
# QMP powerdown helper. Per-VM env files and override drop-ins
# are cleaned in a later task file once those renderings exist.

# Fire all qemu-system stops in parallel rather than serially
# through the loop. Each stop uses qemu-system@.service's
# graceful path (QMP system_powerdown via ExecStop, then
# SIGKILL after TimeoutSec=2min if the guest does not
# acknowledge), so a sequential loop costs ~2min worst case
# per VM and stacks linearly with the matrix size — 4 VMs
# means ~8min, 9 VMs would mean ~18min. Submitting each stop
# with async + poll: 0 returns immediately; a single
# async_status polling task then waits for all of them
# concurrently. Wall time drops to roughly max(per-VM stop
# time) + a few seconds of polling overhead, independent of
# how many VMs the matrix carries. The async timeout is set
# to 180s to give a small buffer past TimeoutSec=2min for
# systemd's own teardown bookkeeping.
- name: Stop qemu-system@<vm> instances (parallel)
  ansible.builtin.systemd_service:
    name: "qemu-system@{{ item }}.service"
    state: stopped
    scope: user
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  loop_control:
    label: "qemu-system@{{ item }}"
  async: 180
  poll: 0
  register: qsu_stop_jobs
  failed_when: false

- name: Wait for qemu-system stops to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ qsu_stop_jobs.results }}"
  loop_control:
    label: "qemu-system@{{ item.item }}"
  register: qsu_stop_wait
  until: qsu_stop_wait.finished
  retries: 60
  delay: 3
  failed_when: false
  when: item.ansible_job_id is defined

- name: Remove SSH config entries for qsu VMs
  ansible.builtin.command: |
    python3 {{ playbook_dir }}/../scripts/update_ssh_config_nixos.py remove \
      {{ item }} \
      '' \
      '' \
      '' \
      {{ ansible_facts.env.HOME }}/.ssh/config \
      '' \
      'qsu imageless NixOS'
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  failed_when: false

- name: Clean up per-node generated imageless configurations
  ansible.builtin.file:
    path: "{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ item }}"
    state: absent
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"

- name: Remove per-VM vm.env files
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/systemd/qemu-system/{{ item }}.env"
    state: absent
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"

- name: Remove per-VM service drop-in directories
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/systemd/user/qemu-system@{{ item }}.service.d"
    state: absent
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"

- name: Remove per-share virtiofsd env files
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/systemd/virtiofsd/{{ item.0 }}-{{ item.1 }}.env"
    state: absent
  loop: "{{ (groups['all'] | reject('equalto', 'localhost') | list) | product(['store', 'modules', 'data-configs', 'data-results', 'kdevops-fstests', 'data-monitor']) | list }}"
  loop_control:
    label: "{{ item.0 }}-{{ item.1 }}"

# `true` as the third default() arg so an empty XDG_STATE_HOME
# falls through to $HOME/.local/state rather than producing a
# bogus "/qemu-system/<vm>" path.
- name: Resolve systemd state root for destroy
  ansible.builtin.set_fact:
    qsu_state_root: "{{ ansible_facts.env.XDG_STATE_HOME | default(ansible_facts.env.HOME ~ '/.local/state', true) }}/qemu-system"

# Workloads may leave entries with restrictive modes inside the
# per-VM /data tree. Restore owner traversal so the following
# state: absent task can finish.
- name: Make per-VM state directories traversable before removal
  ansible.builtin.command:
    cmd: "chmod -R u+rwX {{ qsu_state_root }}/{{ item }}"
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  failed_when: false
  changed_when: false

- name: Remove per-VM systemd state directories
  ansible.builtin.file:
    path: "{{ qsu_state_root }}/{{ item }}"
    state: absent
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"

- name: Remove qsu shared units and helper
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ansible_facts.env.HOME }}/.config/systemd/user/qemu-system@.service"
    - "{{ ansible_facts.env.HOME }}/.config/systemd/user/virtiofsd@.service"
    - "{{ ansible_facts.env.HOME }}/.config/systemd/user/virtiofsd@.socket"
    - "{{ ansible_facts.env.HOME }}/.config/systemd/qemu-system/qmp-powerdown"

- name: Reload user systemd after removal
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
