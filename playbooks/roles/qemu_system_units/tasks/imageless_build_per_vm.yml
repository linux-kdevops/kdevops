---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Per-VM imageless closure build and qsu artefact render. Included
# from imageless_build.yml with qsu_vm_name (VM name) and
# qsu_vm_idx (inventory index) as loop variables.

- name: Build the imageless NixOS closure for {{ qsu_vm_name }}
  ansible.builtin.command:
    argv:
      - nix
      - build
      - "path:{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ qsu_vm_name }}#toplevel"
      - --out-link
      - "{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ qsu_vm_name }}/result"
    creates: "{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ qsu_vm_name }}/result"
  environment:
    PATH: "/nix/var/nix/profiles/default/bin:{{ ansible_facts.env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"

- name: Read bootspec from the built closure for {{ qsu_vm_name }}
  ansible.builtin.slurp:
    src: "{{ topdir_path }}/scripts/nixos-qemu/configurations/{{ qsu_vm_name }}/result/boot.json"
  register: qsu_bootspec_raw

- name: Extract init and initrd paths from bootspec for {{ qsu_vm_name }}
  ansible.builtin.set_fact:
    qsu_init: "{{ (qsu_bootspec_raw.content | b64decode | from_json)['org.nixos.bootspec.v1'].init }}"
    qsu_initrd: "{{ (qsu_bootspec_raw.content | b64decode | from_json)['org.nixos.bootspec.v1'].initrd }}"

# Match qemu-system@.service StateDirectory=qemu-system/%i. In
# user mode %S resolves to $XDG_STATE_HOME (default
# $HOME/.local/state), so compute the absolute path and create
# it before service start. vm.env entries relative to the
# service's WorkingDirectory (nvme.drives[].file, shares.dir)
# resolve under this directory at run time.
- name: Compute per-VM systemd state directory for {{ qsu_vm_name }}
  ansible.builtin.set_fact:
    qsu_state_dir: "{{ ansible_facts.env.XDG_STATE_HOME | default(ansible_facts.env.HOME ~ '/.local/state') }}/qemu-system/{{ qsu_vm_name }}"

- name: Ensure qsu per-VM directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ qsu_per_vm_dirs }}"
  vars:
    qsu_per_vm_dirs_base:
      - "{{ ansible_facts.env.HOME }}/.config/systemd/qemu-system"
      - "{{ ansible_facts.env.HOME }}/.config/systemd/virtiofsd"
      - "{{ ansible_facts.env.HOME }}/.config/systemd/user/qemu-system@{{ qsu_vm_name }}.service.d"
      - "{{ qsu_state_dir }}"
      - "{{ qsu_state_dir }}/data"
      - "{{ qsu_state_dir }}/data/configs"
    # fstests splits its /data share: configs/ stays ephemeral
    # under the VM StateDirectory (wiped by `make destroy`);
    # results land in the kdevops workflow tree so they survive
    # destroy and so downstream tooling can walk last-run/<vm>/
    # live while tests run.
    qsu_per_vm_dirs_fstests: >-
      {{
        [topdir_path ~ '/workflows/fstests/results/last-run/' ~ qsu_vm_name]
        if (kdevops_workflow_enable_fstests | default(false) | bool)
        else []
      }}
    qsu_per_vm_dirs: "{{ qsu_per_vm_dirs_base + qsu_per_vm_dirs_fstests }}"

- name: Create per-VM NVMe qcow2 backing files for {{ qsu_vm_name }}
  ansible.builtin.command:
    argv:
      - qemu-img
      - create
      - -f
      - qcow2
      - "{{ qsu_state_dir }}/nvme{{ item }}.qcow2"
      - "{{ qemu_system_units_extra_storage_drive_size_gb }}G"
    creates: "{{ qsu_state_dir }}/nvme{{ item }}.qcow2"
  loop: "{{ range(qemu_system_units_extra_storage_drive_count | int) | list }}"
  loop_control:
    label: "{{ qsu_vm_name }}-nvme{{ item }}"

- name: Reset per-VM nvme drives accumulator for {{ qsu_vm_name }}
  ansible.builtin.set_fact:
    qsu_nvme_drives: []

# Serial `kdevops<N>` matches the libvirt kdevops bringup so
# guest /dev/disk/by-id/nvme-QEMU_NVMe_Ctrl_kdevops<N>_1 symlinks
# resolve identically on both backends, letting fstests Kconfig
# device knobs point at the same paths across LIBVIRT+NVME and
# QEMU_SYSTEM_UNITS.
- name: Compose per-VM nvme drives for {{ qsu_vm_name }}
  ansible.builtin.set_fact:
    qsu_nvme_drives: "{{ qsu_nvme_drives + [new_drive] }}"
  vars:
    new_drive:
      file: "nvme{{ item }}.qcow2"
      format: qcow2
      serial: "kdevops{{ item }}"
  loop: "{{ range(qemu_system_units_extra_storage_drive_count | int) | list }}"
  loop_control:
    label: "{{ qsu_vm_name }}-kdevops{{ item }}"

# store + modules: read-only bytes from the controller.
# data-configs (opt-in): ephemeral per-host config rendered
# under the VM StateDirectory; wiped by `make destroy`.
# data-results (opt-in): persistent results tree in the
# kdevops workflow dir; survives `make destroy` and lets
# downstream tooling walk last-run/<vm>/ live as tests run.
# kdevops-fstests (opt-in): the controller's workflows/fstests
# tree exposed read-only at /usr/local/lib/kdevops/fstests so
# the guest can exec oscheck.sh without copying scripts in.
- name: Compose per-VM virtiofs shares for {{ qsu_vm_name }}
  ansible.builtin.set_fact:
    qsu_shares: "{{ qsu_shares_base + qsu_shares_fstests }}"
  vars:
    qsu_shares_base:
      - tag: store
        dir: /nix/store
        mount: /nix/store
      - tag: modules
        dir: "{{ qsu_modules_dir }}"
        mount: /lib/modules
    qsu_shares_fstests: >-
      {{
        [
          {'tag': 'data-configs',
           'dir': qsu_state_dir ~ '/data/configs',
           'mount': '/data/configs'},
          {'tag': 'data-results',
           'dir': topdir_path ~ '/workflows/fstests/results/last-run/' ~ qsu_vm_name,
           'mount': '/data/results'},
          {'tag': 'kdevops-fstests',
           'dir': topdir_path ~ '/workflows/fstests',
           'mount': '/usr/local/lib/kdevops/fstests'}
        ]
        if (kdevops_workflow_enable_fstests | default(false) | bool)
        else []
      }}

- name: Render vm.env for {{ qsu_vm_name }}
  ansible.builtin.template:
    src: "{{ topdir_path }}/scripts/qemu-system-units/templates/vm.env.j2"
    dest: "{{ ansible_facts.env.HOME }}/.config/systemd/qemu-system/{{ qsu_vm_name }}.env"
    mode: '0644'
  vars:
    vm_name: "{{ qsu_vm_name }}"
    qemu_binary: "{{ qemu_system_units_qemu_binary }}"
    cpu: "{{ qemu_system_units_cpu }}"
    accel: "{{ qemu_system_units_accel }}"
    ram: "{{ qemu_system_units_ram }}"
    cpus: "{{ qemu_system_units_cpus }}"
    machine_type: "{{ qemu_system_units_machine_type }}"
    ssh_port: "{{ qemu_system_units_ssh_port_base | int + qsu_vm_idx }}"
    vsock_cid: "{{ qemu_system_units_vsock_cid_base | int + qsu_vm_idx }}"
    kernel:
      image: "{{ qsu_kernel_image }}"
      initrd: "{{ qsu_initrd }}"
      append: "console=ttyS0,115200 console=hvc0 init={{ qsu_init }}"
    shares: "{{ qsu_shares }}"
    nvme:
      drives: "{{ qsu_nvme_drives }}"

- name: Render per-VM service drop-in override.conf for {{ qsu_vm_name }}
  ansible.builtin.template:
    src: "{{ topdir_path }}/scripts/qemu-system-units/templates/qemu-system-override.conf.j2"
    dest: "{{ ansible_facts.env.HOME }}/.config/systemd/user/qemu-system@{{ qsu_vm_name }}.service.d/override.conf"
    mode: '0644'
  vars:
    vm_name: "{{ qsu_vm_name }}"
    service_scope: user
    qemu_binary: "{{ qemu_system_units_qemu_binary }}"
    ram: "{{ qemu_system_units_ram }}"
    machine_type: "{{ qemu_system_units_machine_type }}"
    vsock_cid: "{{ qemu_system_units_vsock_cid_base | int + qsu_vm_idx }}"
    shares: "{{ qsu_shares }}"

- name: Render virtiofsd env files for the imageless shares of {{ qsu_vm_name }}
  ansible.builtin.template:
    src: "{{ topdir_path }}/scripts/qemu-system-units/templates/virtiofsd.env.j2"
    dest: "{{ ansible_facts.env.HOME }}/.config/systemd/virtiofsd/{{ qsu_vm_name }}-{{ item.tag }}.env"
    mode: '0644'
  vars:
    vm_name: "{{ qsu_vm_name }}"
    share_tag: "{{ item.tag }}"
    shares:
      - tag: "{{ item.tag }}"
        dir: "{{ item.dir }}"
  loop: "{{ qsu_shares }}"
  loop_control:
    label: "{{ qsu_vm_name }}-{{ item.tag }}"
