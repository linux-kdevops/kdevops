---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# Native systemctl restart of every qemu-system@<vm>.service in
# the inventory, then wait for each guest's sshd to greet on its
# forwarded port. Used by `make restart-vms` and
# `make rebuild-restart`.
#
# JOB_RESTART works cleanly because qemu-system-override.conf
# uses Requires=virtiofsd@%i-<tag>.service rather than BindsTo=,
# which removes the UNIT_ATOM_CANNOT_BE_ACTIVE_WITHOUT death-link
# (src/core/unit.c:2233 unit_is_bound_by_inactive()) that
# previously raced the in-place JOB_RESTART -> JOB_START morph
# (src/core/job.c:1027). After the stop phase drops virtiofsd to
# inactive via vhost-user disconnect, the morphed JOB_START runs
# without the death-link tripping; QEMU connects to
# virtiofsd@.socket and socket activation spawns a fresh
# virtiofsd@.service. See
# scripts/qemu-system-units/docs/design-decisions.md
# "virtiofsd dependency: Requires=, not BindsTo=" for the
# tradeoff (loss of automatic crash-kill propagation) and the
# revert path if that property must be re-acquired.

- name: Restart qemu-system@<vm> instances
  ansible.builtin.systemd_service:
    name: "qemu-system@{{ item }}.service"
    state: restarted
    scope: user
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"

# After the restart QEMU re-execs and the guest goes through
# stage-1 + stage-2 boot before sshd is reachable. Without
# blocking on sshd-greeting, the next play (typically
# fstests-baseline) hits the guest while the proxy dialer's
# upstream socket is up but the guest hasn't bound port 22 yet,
# producing
#   Failed to connect to the host via ssh:
#     mm_receive_fd: recvmsg: expected received 1 got 0
#     proxy dialer did not pass back a connection
# in the very first ssh task. Mirror the same wait_for that
# bringup.yml runs after starting the qemu-system services so
# every restart path enforces the same readiness contract: sshd
# must answer before we declare the VM available.
- name: Wait for sshd to greet on each VM's forwarded port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ qsu_ssh_port_base | int + qsu_vm_idx }}"
    search_regex: "^SSH-2\\.0"
    delay: 5
    timeout: 300
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  loop_control:
    loop_var: qsu_vm_name
    index_var: qsu_vm_idx
    label: "{{ qsu_vm_name }}:{{ qsu_ssh_port_base | int + qsu_vm_idx }}"
