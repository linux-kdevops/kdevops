---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# fstests role orchestrator. Each lifecycle phase has a distro
# and a qsu (imageless NixOS) variant gated on
# kdevops_enable_qemu_system_units. include_tasks (not
# import_tasks) ensures distro-only task names that dereference
# variables set earlier in the distro chain never render on a
# qsu run; tags: always lets --tags filter children normally
# without skipping the include itself.

- name: Import optional extra_args file
  ansible.builtin.include_vars: "{{ item }}"
  ignore_errors: true
  with_first_found:
    - files:
        - "../extra_vars.yml"
        - "../extra_vars.yaml"
        - "../extra_vars.json"
      skip: true
  tags: vars

- ansible.builtin.include_role:
    name: create_data_partition
  when: not (kdevops_enable_qemu_system_units | default(false) | bool)
  tags: ["oscheck", "data_partition"]

- ansible.builtin.include_tasks: setup-qsu.yml
  when: kdevops_enable_qemu_system_units | default(false) | bool
  tags: always

- ansible.builtin.include_tasks: setup.yml
  when: not (kdevops_enable_qemu_system_units | default(false) | bool)
  tags: always

- ansible.builtin.include_tasks: config-qsu.yml
  when: kdevops_enable_qemu_system_units | default(false) | bool
  tags: always

- ansible.builtin.include_tasks: config.yml
  when: not (kdevops_enable_qemu_system_units | default(false) | bool)
  tags: always

- ansible.builtin.include_tasks: run-qsu.yml
  when: kdevops_enable_qemu_system_units | default(false) | bool
  tags: always

- ansible.builtin.include_tasks: run.yml
  when: not (kdevops_enable_qemu_system_units | default(false) | bool)
  tags: always

- ansible.builtin.include_tasks: results-qsu.yml
  when: kdevops_enable_qemu_system_units | default(false) | bool
  tags: always

- ansible.builtin.include_tasks: results.yml
  when: not (kdevops_enable_qemu_system_units | default(false) | bool)
  tags: always
