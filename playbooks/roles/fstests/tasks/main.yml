# SPDX-License-Identifier: copyleft-next-0.3.1
#
# fstests role orchestrator. Phase task files split the role by
# lifecycle stage:
#
#   setup.yml    Install distro dependencies, build xfsprogs
#                and fstests on the guest.
#   config.yml   Render the per-host <fstyp>.config, discover
#                NVMe drives, partition and lay out the test and
#                scratch pools, prepare NFS and CIFS exports.
#   run.yml      Reboot, load loopback modules, verify
#                dependencies, invoke oscheck.sh.
#   results.yml  Fetch check.time, check.log, xunit XML, .bad,
#                dmesg, TFB artefacts; summarise and archive.

- name: Import optional extra_args file
  ansible.builtin.include_vars: "{{ item }}"
  ignore_errors: true
  with_first_found:
    - files:
        - "../extra_vars.yml"
        - "../extra_vars.yaml"
        - "../extra_vars.json"
      skip: true
  tags: vars

- ansible.builtin.include_role:
    name: create_data_partition
  tags: ["oscheck", "data_partition"]

- ansible.builtin.import_tasks: setup.yml

- ansible.builtin.import_tasks: config.yml

- ansible.builtin.import_tasks: run.yml

- ansible.builtin.import_tasks: results.yml
