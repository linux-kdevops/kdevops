---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# fstests run phase for the qsu (imageless NixOS) bringup
# path. Invokes oscheck.sh against the nixpkgs xfstests tree at
# /usr/lib/xfstests with all run-time parameters passed as env.
# Everything runs as root over SSH (no sudo, no reboot) against
# a guest the qemu_system_units role already brought up with
# the required userland on PATH.

- name: Render fstests section name from inventory hostname
  ansible.builtin.set_fact:
    fstests_section: "{{ inventory_hostname | regex_replace(kdevops_host_prefix + '-') | regex_replace('-dev') | regex_replace('-', '_') }}"
  tags: ["oscheck", "fstests", "run_tests"]

# data-results and data-monitor are mounted from the kdevops
# workflow tree and persist across runs. Clear the section's
# subtree (xfstests output) AND the monitoring subtree
# (snapshot start/end.json plus sysstat sa-current) on the
# controller before each invocation so stale .full/.dmesg/
# check.* and stale end.json/sa-current from a previous run on
# the same (VM, kernel) don't mingle with the new ones.
#
# qsu virtiofsd has open share roots at <vm>/<kernel>/
# (data-results) and <vm>/<kernel>/monitoring/ (data-monitor),
# so we wipe the children of those roots but leave the roots
# themselves intact. -mindepth 1 keeps the share root, -maxdepth 1
# avoids descending (rm -rf does that).
- name: Clear stale results for section {{ fstests_section }}
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ topdir_path }}/workflows/fstests/results/last-run/{{ inventory_hostname }}/{{ fstests_section }}"
    state: absent
  tags: ["oscheck", "fstests", "run_tests"]

- name: Clear stale monitoring subtree before this run
  delegate_to: localhost
  ansible.builtin.shell: |
    d="{{ topdir_path }}/workflows/fstests/results/last-run/{{ inventory_hostname }}/monitoring"
    if [ -d "$d" ]; then
      find "$d" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
    fi
  changed_when: true
  tags: ["oscheck", "fstests", "run_tests"]

# Replicate the relevant bits of distro run.yml's LIMIT_TESTS
# resolution here since run.yml is gated off on qsu. The env
# var is populated by kdevops' top-level Makefile when the
# caller runs `make fstests-baseline TESTS='…'`; the Kconfig
# fallback applies when TESTS= is absent.
- name: Resolve LIMIT_TESTS from env or FSTESTS_RUN_CUSTOM_TESTS
  ansible.builtin.set_fact:
    all_limit_tests: >-
      {{
        lookup('env', 'LIMIT_TESTS')
        if (lookup('env', 'LIMIT_TESTS') | length > 0)
        else (limit_tests | default('', true))
      }}
  tags: ["oscheck", "fstests", "run_tests"]

# Build the args string oscheck.sh appends to ./check on START_AFTER=.
# Mirrors playbooks/roles/fstests/tasks/run.yml:185 so kdevops users
# get the same behaviour on qsu.
- name: Build --start-after arg from START_AFTER=
  ansible.builtin.set_fact:
    fstests_initial_baseline_args: "--start-after {{ fstests_start_after_test }}"
  when:
    - fstests_start_after | default(false) | bool
    - fstests_start_after_test | default('') | length > 0
  tags: ["oscheck", "fstests", "run_tests"]

# Build the args string oscheck.sh appends to ./check on SKIP_TESTS=.
# Mirrors playbooks/roles/fstests/tasks/run.yml:192.
- name: Build -e arg from SKIP_TESTS=
  ansible.builtin.set_fact:
    fstests_skip_tests_args: "-e {{ fstests_skip_tests }}"
  when:
    - fstests_skip_tests_enable | default(false) | bool
    - fstests_skip_tests | default('') | length > 0
  tags: ["oscheck", "fstests", "run_tests"]

# SKIP_RUN= halts after the args resolution so a user can see what
# would have been run without spending the time. Same end_play
# meta task as the libvirt path at run.yml:375-379.
- name: Stop early when SKIP_RUN= is set
  ansible.builtin.meta: end_play
  when:
    - fstests_skip_run | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests"]

# Start monitoring services on the guest right before oscheck.sh
# kicks off so the time series brackets the actual test workload
# rather than the surrounding ansible setup. Mirrors what the
# libvirt run.yml does at L382. Skipped when monitoring is off.
- ansible.builtin.import_tasks: ../../monitoring/tasks/monitor_run.yml
  when:
    - kdevops_run_fstests | default(false) | bool
    - enable_monitoring | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests", "monitoring", "monitor_run"]

- name: Run fstests via oscheck.sh on {{ inventory_hostname }}
  vars:
    initial_baseline_expunges: "{{ fstests_initial_baseline_args | default('') | trim }}"
    skip_tests_args: "{{ fstests_skip_tests_args | default('') | trim }}"
  tags: ["oscheck", "fstests", "run_tests"]
  ansible.builtin.command: |
    /usr/local/lib/kdevops/fstests/scripts/oscheck.sh
      --print-start
      --print-done
      --journal {{ fstests_journal | default('no') }}
      --test-section
      {{ fstests_section }}
      {{ oscheck_extra_args | default('') }}
      {{ all_limit_tests | default('') }}
      {{ initial_baseline_expunges }}
      {{ skip_tests_args }}
  args:
    chdir: /usr/lib/xfstests
  environment:
    FSTYP: "{{ fstests_fstyp }}"
    HOST_OPTIONS: "/data/configs/{{ inventory_hostname }}.config"
    RESULT_BASE: "/data/results"
    FSTESTS_LINUX_LOCALVERSION: "{{ target_linux_localversion | default('') }}"
    FSTESTS_RUN_LARGE_DISK_TESTS: "{{ run_large_disk_tests | default('') }}"
    FSTESTS_RUN_AUTO_GROUP_TESTS: "{{ run_auto_group_tests | default('') }}"
    FSTESTS_RUN_CUSTOM_GROUP_TESTS: "{{ run_custom_group_tests | default('') }}"
    FSTESTS_EXCLUDE_TEST_GROUPS: "{{ exclude_test_groups | default('') }}"
    LIMIT_TESTS: "{{ all_limit_tests | default('') }}"
    TEST_DEV: "{{ fstests_test_dev }}"
    TEST_DIR: "{{ fstests_test_dir }}"
    KEEP_DMESG: "yes"
  ignore_errors: true
  when:
    - kdevops_run_fstests | default(false) | bool

# Stop monitoring services and convert sa-current to JSON via the
# unit's ExecStopPost. The data is already on the controller via
# the data-monitor virtiofs share, so no fetch step is needed.
- ansible.builtin.import_tasks: ../../monitoring/tasks/monitor_collect.yml
  when:
    - kdevops_run_fstests | default(false) | bool
    - enable_monitoring | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests", "monitoring", "monitor_collect"]
