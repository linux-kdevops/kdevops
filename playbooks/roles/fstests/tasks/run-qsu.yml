---
# SPDX-License-Identifier: copyleft-next-0.3.1
#
# fstests run phase for the qsu (imageless NixOS) bringup
# path. Invokes oscheck.sh against the nixpkgs xfstests tree at
# /usr/lib/xfstests with all run-time parameters passed as env.
# Everything runs as root over SSH (no sudo, no reboot) against
# a guest the qemu_system_units role already brought up with
# the required userland on PATH.

- name: Render fstests section name from inventory hostname
  ansible.builtin.set_fact:
    fstests_section: "{{ inventory_hostname | regex_replace(kdevops_host_prefix + '-') | regex_replace('-dev') | regex_replace('-', '_') }}"
  tags: ["oscheck", "fstests", "run_tests"]

# data-results and data-monitor are mounted from the kdevops
# workflow tree and persist across runs. Clear every artefact
# beneath the per-(VM, kernel) root on the controller before
# each invocation so nothing from a previous run lingers — the
# section subtree (xfstests .full/.dmesg/check.*), the
# monitoring subtree (snapshot start/end.json plus sysstat
# sa-current), and the controller-generated summaries
# (bad_results.txt, xunit_results.txt, check.log, check.full,
# check.time, check.time.distribution, new_expunge_files.txt)
# all start fresh. results-qsu.yml regenerates summaries
# conditionally (e.g. bad_results.txt only when *.out.bad files
# exist), so leaving stale ones in place would let a prior run's
# failure summary survive a clean re-run that produces no
# failures.
#
# The wipe target is the per-(VM, kernel) directory keyed off
# the live guest's uname -r, not the per-VM last-run symlink.
# last-run only points at the previous run's kernel, so on a
# kernel-changed boot it would either be stale (pointing at the
# old kernel after linux-deploy) or missing (first run). Reading
# uname from the running guest pins the path to the kernel
# actually about to be tested, which is the right invariant for
# A/B testing where a re-run on the same kernel must reset state
# while a new kernel must leave the previous kernel's tree alone.
#
# qsu virtiofsd has its data-results share root open at
# <vm>/<kernel>/ (with data-monitor at <vm>/<kernel>/monitoring/
# pivoting under it), so we wipe every direct child of the
# per-(VM, kernel) root but leave the root itself intact. The
# qsu_existing find above already enumerates those children
# non-recursively, so the wipe loops over qsu_existing.files and
# removes each path with ansible.builtin.file — no shell, no
# find -exec, just the canonical ansible primitive.
#
# Before wiping, the role checks whether each VM's per-(VM,
# kernel) directory actually holds anything and aggregates the
# answer across all VMs into a single prompt. Without aggregation
# ansible's linear strategy + delegate_to: localhost on
# ansible.builtin.pause renders one prompt for the play with
# whichever host won the race interpolating the body — the user
# only sees that VM's count, even though the per-host wipe tasks
# below silently delete every VM's tree. The aggregated prompt
# enumerates every VM whose tree is non-empty (and the path the
# wipe will touch) so the user can verify the full scope before
# pressing Enter. Set CONFIG_WORKFLOW_RESULTS_WIPE_NO_PROMPT=y in
# .config (or --extra-vars workflow_results_wipe_no_prompt=true on
# a single invocation) to skip the prompt for non-interactive use
# (CI). When no VM has prior results the prompt is skipped
# silently and the wipes below are no-ops.

- name: Detect target kernel release on {{ inventory_hostname }}
  ansible.builtin.command: "uname -r"
  register: qsu_uname
  changed_when: false
  tags: ["oscheck", "fstests", "run_tests"]

- name: Resolve per-(VM, kernel) results root for {{ inventory_hostname }}
  ansible.builtin.set_fact:
    qsu_run_root: "{{ topdir_path }}/workflows/fstests/results/{{ inventory_hostname }}/{{ qsu_uname.stdout | trim }}"
  tags: ["oscheck", "fstests", "run_tests"]

- name: Discover existing per-(VM, kernel) artefacts on the controller
  delegate_to: localhost
  ansible.builtin.find:
    paths: "{{ qsu_run_root }}"
    file_type: any
    recurse: false
  register: qsu_existing
  changed_when: false
  failed_when: false
  tags: ["oscheck", "fstests", "run_tests"]

# Aggregate every VM's discovery result into a single list on the
# controller. Walks groups['all'] minus localhost, pulls each
# host's qsu_existing.matched from hostvars, and appends the host
# to qsu_wipe_targets when matched > 0. run_once: true so the
# walk happens once per play; delegate_to: localhost so the fact
# lives on the controller where the pause runs. Two-step
# init-then-accumulate avoids fragile nested filter chains
# (selectattr 'a.b' is undefined behaviour on some ansible
# versions) and keeps the per-host condition explicit and
# inspectable.
- name: Initialize qsu_wipe_targets accumulator
  run_once: true
  delegate_to: localhost
  ansible.builtin.set_fact:
    qsu_wipe_targets: []
  tags: ["oscheck", "fstests", "run_tests"]

- name: Aggregate wipe targets across all VMs
  run_once: true
  delegate_to: localhost
  ansible.builtin.set_fact:
    qsu_wipe_targets: "{{ qsu_wipe_targets + [item] }}"
  loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
  when:
    - hostvars[item].qsu_existing is defined
    - (hostvars[item].qsu_existing.matched | default(0) | int) > 0
  tags: ["oscheck", "fstests", "run_tests"]

- name: Confirm before wiping existing per-(VM, kernel) results
  run_once: true
  delegate_to: localhost
  ansible.builtin.pause:
    prompt: |
      About to wipe per-(VM, kernel) results on the controller:

      {% for h in qsu_wipe_targets %}
        - {{ h }}: {{ hostvars[h].qsu_existing.matched }} top-level entry(ies)
            {{ hostvars[h].qsu_run_root }}
      {% endfor %}
      Every direct child of each per-(VM, kernel) root will be
      wiped: section subtree (xfstests .full/.dmesg/check.*
      output), monitoring subtree (snapshot start/end.json plus
      sysstat sa-current), and controller-generated summaries
      (bad_results.txt, xunit_results.txt, check.log, check.full,
      check.time, check.time.distribution, new_expunge_files.txt).

      Press Enter to wipe and continue, or Ctrl+C to abort and back
      up first. Set CONFIG_WORKFLOW_RESULTS_WIPE_NO_PROMPT=y in
      .config (or --extra-vars workflow_results_wipe_no_prompt=true
      on a one-shot run) to skip this prompt.
  when:
    - qsu_wipe_targets | length > 0
    - not (workflow_results_wipe_no_prompt | default(false) | bool)
  tags: ["oscheck", "fstests", "run_tests"]

- name: Clear every per-(VM, kernel) artefact on the controller
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ qsu_existing.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: ["oscheck", "fstests", "run_tests"]

# Replicate the relevant bits of distro run.yml's LIMIT_TESTS
# resolution here since run.yml is gated off on qsu. The env
# var is populated by kdevops' top-level Makefile when the
# caller runs `make fstests-baseline TESTS='…'`; the Kconfig
# fallback applies when TESTS= is absent.
- name: Resolve LIMIT_TESTS from env or FSTESTS_RUN_CUSTOM_TESTS
  ansible.builtin.set_fact:
    all_limit_tests: >-
      {{
        lookup('env', 'LIMIT_TESTS')
        if (lookup('env', 'LIMIT_TESTS') | length > 0)
        else (limit_tests | default('', true))
      }}
  tags: ["oscheck", "fstests", "run_tests"]

# Build the args string oscheck.sh appends to ./check on START_AFTER=.
# Mirrors playbooks/roles/fstests/tasks/run.yml:185 so kdevops users
# get the same behaviour on qsu.
- name: Build --start-after arg from START_AFTER=
  ansible.builtin.set_fact:
    fstests_initial_baseline_args: "--start-after {{ fstests_start_after_test }}"
  when:
    - fstests_start_after | default(false) | bool
    - fstests_start_after_test | default('') | length > 0
  tags: ["oscheck", "fstests", "run_tests"]

# Build the args string oscheck.sh appends to ./check on SKIP_TESTS=.
# Mirrors playbooks/roles/fstests/tasks/run.yml:192.
- name: Build -e arg from SKIP_TESTS=
  ansible.builtin.set_fact:
    fstests_skip_tests_args: "-e {{ fstests_skip_tests }}"
  when:
    - fstests_skip_tests_enable | default(false) | bool
    - fstests_skip_tests | default('') | length > 0
  tags: ["oscheck", "fstests", "run_tests"]

# SKIP_RUN= halts after the args resolution so a user can see what
# would have been run without spending the time. Same end_play
# meta task as the libvirt path at run.yml:375-379.
- name: Stop early when SKIP_RUN= is set
  ansible.builtin.meta: end_play
  when:
    - fstests_skip_run | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests"]

# Start monitoring services on the guest right before oscheck.sh
# kicks off so the time series brackets the actual test workload
# rather than the surrounding ansible setup. Mirrors what the
# libvirt run.yml does at L382. Skipped when monitoring is off.
- ansible.builtin.import_tasks: ../../monitoring/tasks/monitor_run.yml
  when:
    - kdevops_run_fstests | default(false) | bool
    - enable_monitoring | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests", "monitoring", "monitor_run"]

- name: Run fstests via oscheck.sh on {{ inventory_hostname }}
  vars:
    initial_baseline_expunges: "{{ fstests_initial_baseline_args | default('') | trim }}"
    skip_tests_args: "{{ fstests_skip_tests_args | default('') | trim }}"
  tags: ["oscheck", "fstests", "run_tests"]
  ansible.builtin.command: |
    /usr/local/lib/kdevops/fstests/scripts/oscheck.sh
      --print-start
      --print-done
      --journal {{ fstests_journal | default('no') }}
      --test-section
      {{ fstests_section }}
      {{ oscheck_extra_args | default('') }}
      {{ all_limit_tests | default('') }}
      {{ initial_baseline_expunges }}
      {{ skip_tests_args }}
  args:
    chdir: /usr/lib/xfstests
  environment:
    FSTYP: "{{ fstests_fstyp }}"
    HOST_OPTIONS: "/data/configs/{{ inventory_hostname }}.config"
    RESULT_BASE: "/data/results"
    FSTESTS_LINUX_LOCALVERSION: "{{ target_linux_localversion | default('') }}"
    FSTESTS_RUN_LARGE_DISK_TESTS: "{{ run_large_disk_tests | default('') }}"
    FSTESTS_RUN_AUTO_GROUP_TESTS: "{{ run_auto_group_tests | default('') }}"
    FSTESTS_RUN_CUSTOM_GROUP_TESTS: "{{ run_custom_group_tests | default('') }}"
    FSTESTS_EXCLUDE_TEST_GROUPS: "{{ exclude_test_groups | default('') }}"
    LIMIT_TESTS: "{{ all_limit_tests | default('') }}"
    TEST_DEV: "{{ fstests_test_dev }}"
    TEST_DIR: "{{ fstests_test_dir }}"
    KEEP_DMESG: "yes"
  ignore_errors: true
  when:
    - kdevops_run_fstests | default(false) | bool

# Stop monitoring services and convert sa-current to JSON via the
# unit's ExecStopPost. The data is already on the controller via
# the data-monitor virtiofs share, so no fetch step is needed.
- ansible.builtin.import_tasks: ../../monitoring/tasks/monitor_collect.yml
  when:
    - kdevops_run_fstests | default(false) | bool
    - enable_monitoring | default(false) | bool
  tags: ["oscheck", "fstests", "run_tests", "monitoring", "monitor_collect"]
