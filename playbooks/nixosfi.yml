---
- name: Manage imageless NixOS VMs with qemu-system-units
  hosts: localhost
  vars_files:
    - "{{ playbook_dir }}/../extra_vars.yaml"
  roles:
    - role: nixosfi

- name: Run nixos-rebuild test on running nixosfi guests
  hosts: baseline:dev
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../extra_vars.yaml"
  tasks:
    # Two activation paths, selected by tag. Pick one; running both
    # together first regenerates then activates from the regenerated
    # config (rebuild-test behaviour with extra cost).
    #
    #   --tags rebuild-test  regenerate per-VM flake from kdevops
    #                        templates then build + switch-to-config test.
    #   --tags nixosfi-test  keep per-VM flake on disk; build +
    #                        switch-to-config test. Use when operator
    #                        edits to nixos/generated/<vm>/*.nix must
    #                        survive.
    - name: Include nixosfi rebuild-test tasks
      ansible.builtin.include_role:
        name: nixosfi
        tasks_from: rebuild-test
        apply:
          tags:
            - rebuild-test
      tags:
        - rebuild-test

    - name: Include nixosfi test (keep-on-disk-flake) tasks
      ansible.builtin.include_role:
        name: nixosfi
        tasks_from: test
        apply:
          tags:
            - nixosfi-test
      tags:
        - nixosfi-test
